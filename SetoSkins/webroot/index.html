<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Seto Thermal Control</title>
<style>
:root {
  --bg: #121212;
  --surface: #1e1e1e;
  --surface2: #2a2a2a;
  --primary: #bb86fc;
  --primary-dark: #9a67ea;
  --secondary: #03dac6;
  --error: #cf6679;
  --on-bg: #e1e1e1;
  --on-surface: #ffffff;
  --on-surface-dim: #aaaaaa;
  --border: #333333;
  --success: #4caf50;
  --warning: #ff9800;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--on-bg);
  min-height: 100vh;
  padding-bottom: 80px;
}
.header {
  background: var(--surface);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 18px; color: var(--on-surface); }
.header-right { display: flex; gap: 12px; align-items: center; }
.lang-select {
  background: var(--surface2);
  color: var(--on-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 13px;
  outline: none;
}
.status-bar {
  background: var(--surface);
  padding: 12px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.status-item {
  text-align: center;
}
.status-item .label {
  font-size: 11px;
  color: var(--on-surface-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-item .value {
  font-size: 18px;
  font-weight: 700;
  color: var(--secondary);
  margin-top: 2px;
}
.section {
  margin: 12px 16px;
  background: var(--surface);
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.section-title {
  padding: 14px 16px 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.config-item {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  min-height: 56px;
}
.config-item:last-child { border-bottom: none; }
.config-item .info { flex: 1; margin-right: 12px; }
.config-item .name {
  font-size: 14px;
  color: var(--on-surface);
  font-weight: 500;
}
.config-item .desc {
  font-size: 12px;
  color: var(--on-surface-dim);
  margin-top: 3px;
  line-height: 1.4;
}
.toggle {
  position: relative;
  width: 48px;
  height: 26px;
  flex-shrink: 0;
}
.toggle input {
  opacity: 0;
  width: 0;
  height: 0;
}
.toggle .slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #555;
  border-radius: 26px;
  transition: 0.3s;
}
.toggle .slider:before {
  content: "";
  position: absolute;
  height: 20px;
  width: 20px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}
.toggle input:checked + .slider {
  background: var(--primary);
}
.toggle input:checked + .slider:before {
  transform: translateX(22px);
}
.number-input {
  background: var(--surface2);
  color: var(--on-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  width: 130px;
  font-size: 14px;
  outline: none;
  text-align: right;
  flex-shrink: 0;
}
.number-input:focus { border-color: var(--primary); }
.number-input::placeholder { color: var(--on-surface-dim); }
.sub-item {
  padding: 8px 16px 8px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  min-height: 48px;
  background: rgba(0,0,0,0.15);
}
.sub-item .name { font-size: 13px; }
.app-list-textarea {
  width: 100%;
  min-height: 100px;
  background: var(--surface2);
  color: var(--on-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  font-family: monospace;
  outline: none;
  resize: vertical;
  margin: 8px 16px 12px;
  line-height: 1.6;
}
.app-list-textarea:focus { border-color: var(--primary); }
.app-list-textarea::placeholder { color: var(--on-surface-dim); }
.number-tip {
  font-size: 11px;
  color: var(--on-surface-dim);
  margin-top: 2px;
  line-height: 1.3;
}
.save-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  padding: 12px 20px;
  display: flex;
  gap: 12px;
  border-top: 1px solid var(--border);
  z-index: 100;
}
.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}
.btn-primary {
  background: var(--primary);
  color: #000;
}
.btn-primary:active { background: var(--primary-dark); }
.btn-secondary {
  background: var(--surface2);
  color: var(--on-bg);
  border: 1px solid var(--border);
}
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: white;
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 500;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.error { background: var(--error); }
.loading {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 300;
}
.loading.hidden { display: none; }
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.warning-badge {
  display: inline-block;
  background: var(--error);
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 6px;
  vertical-align: middle;
}
</style>
</head>
<body>

<div class="loading hidden" id="loading"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>
<div class="root-dialog-overlay hidden" id="rootDialog">
  <div class="root-dialog">
    <div class="dialog-icon">🔒</div>
    <div class="dialog-title" id="rootDialogTitle" data-i18n="dialog.no_root">Root 权限未授予</div>
    <div class="dialog-msg" id="rootDialogMsg" data-i18n="dialog.no_root.desc">本模块需要 Root 权限才能运行</div>
    <button class="dialog-btn" id="rootDialogBtn" data-i18n="dialog.retry">重试</button>
  </div>
</div>

<div class="header">
  <h1 id="h-title">Seto Thermal</h1>
  <div class="header-right">
    <select class="lang-select" id="langSelect" onchange="switchLang(this.value)"></select>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <div class="status-item"><div class="label" data-i18n="status.temp">Temperature</div><div class="value" id="st-temp">--</div></div>
  <div class="status-item"><div class="label" data-i18n="status.current">Current</div><div class="value" id="st-current">--</div></div>
  <div class="status-item"><div class="label" data-i18n="status.battery">Battery</div><div class="value" id="st-battery">--</div></div>
  <div class="status-item"><div class="label" data-i18n="status.state">State</div><div class="value" id="st-status">--</div></div>
</div>

<div id="configContainer"></div>

<div class="save-bar">
  <button class="btn btn-secondary" onclick="loadConfig()" data-i18n="btn.reload">Reload</button>
  <button class="btn btn-primary" onclick="saveAndApply()" data-i18n="btn.save">Save & Apply</button>
</div>

let currentLang = "en";
let configData = {};
let appListData = "";
let blacklistData = "";
let modDir = "";

function t(key) {
  return LANGS[currentLang][key] || LANGS["en"][key] || LANGS["zh-CN"][key] || key;
}

function switchLang(lang) {
  currentLang = lang;
  localStorage.setItem("seto_lang", lang);
  document.getElementById("h-title").textContent = t("h.title");
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  renderConfig();
}

function detectLang() {
  const saved = localStorage.getItem("seto_lang");
  if (saved && LANGS[saved]) return saved;
  const nav = (navigator.language || "en").toLowerCase();
  if (nav.startsWith("zh-tw") || nav.startsWith("zh-hant")) return "zh-TW";
  if (nav.startsWith("zh")) return "zh-CN";
  for (const code of Object.keys(LANGS)) {
    if (nav.startsWith(code.toLowerCase().split("-")[0])) return code;
  }
  return "en";
}

function initLangSelect() {
  const sel = document.getElementById("langSelect");
  sel.innerHTML = "";
  for (const [code, data] of Object.entries(LANGS)) {
    const opt = document.createElement("option");
    opt.value = code;
    opt.textContent = data.name;
    if (code === currentLang) opt.selected = true;
    sel.appendChild(opt);
  }
}

// ==================== Shell Execution ====================
async function execCmd(cmd) {
  if (typeof ksu !== "undefined" && ksu.exec) {
    return new Promise((resolve, reject) => {
      const callbackName = "exec_cb_" + Date.now() + "_" + Math.random().toString(36).substr(2,5);
      window[callbackName] = function(errno, stdout, stderr) {
        delete window[callbackName];
        resolve({ errno, stdout, stderr });
      };
      ksu.exec(cmd, "{}", callbackName);
    });
  } else {
    // Magisk browser mode - use CGI
    try {
      const resp = await fetch("/cgi-bin/api.sh?action=exec&cmd=" + encodeURIComponent(cmd));
      return await resp.json();
    } catch(e) {
      return { errno: 1, stdout: "", stderr: e.message };
    }
  }
}

// ==================== Config Parsing ====================
function parseConfig(text) {
  const config = {};
  const lines = text.split("\n");
  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith("#") || trimmed === "") continue;
    const eqIdx = trimmed.indexOf("=");
    if (eqIdx === -1) continue;
    const key = trimmed.substring(0, eqIdx).trim();
    const val = trimmed.substring(eqIdx + 1).trim();
    if (key && !key.startsWith("#")) {
      config[key] = val;
    }
  }
  return config;
}

function serializeConfig(config) {
  // Rebuild the config file preserving comments from original
  const lines = [];
  lines.push("# Seto Thermal Config - Generated by WebUI");
  lines.push("# " + new Date().toISOString());
  lines.push("");

  const SECTIONS = [
    { keys: ["简洁版配置", "模块简介显示充电信息", "开启充电Log"] },
    { keys: ["温控空文件挂载", "快充模式", "还原性能模式温控", "均衡式性能温控", "跳电修复模式"] },
    { keys: ["开启修改电流数", "最大电流数"] },
    { keys: ["开启充电调速", "一限温度阈值", "一限限制电流", "二限温度阈值", "二限限制电流", "三限温度阈值", "三限限制电流", "延迟温度阈值"] },
    { keys: ["自定义阶梯模式", "一限电量阈值", "一限电量限制电流", "二限电量阈值", "二限电量限制电流", "三限电量阈值", "三限电量限制电流"] },
    { keys: ["亮息屏调速", "亮屏限制电流", "锁屏限制电流"] },
    { keys: ["分应用调速"] },
    { keys: ["当电流低于阈值执行停充", "电量多少检测阈值", "电流阈值", "降低到多少电量恢复充电"] },
    { keys: ["关闭录制温控", "关闭相机温控"] },
    { keys: ["全局高刷（和dfps冲突）", "关闭logd", "关闭millet", "关闭锁游戏分辨率（记得游戏加速选高质量）", "加快部分游戏启动速度"] },
  ];

  const written = new Set();
  for (const sec of SECTIONS) {
    for (const key of sec.keys) {
      if (key in config) {
        lines.push(key + "=" + config[key]);
        written.add(key);
      }
    }
    lines.push("");
  }

  // Write any remaining keys
  for (const [key, val] of Object.entries(config)) {
    if (!written.has(key)) {
      lines.push(key + "=" + val);
    }
  }

  return lines.join("\n");
}

function renderConfig() {
  const container = document.getElementById("configContainer");
  container.innerHTML = "";

  for (const group of CONFIG_LAYOUT) {
    const sec = document.createElement("div");
    sec.className = "section";

    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = t(group.section);
    sec.appendChild(title);

    for (const item of group.items) {
      sec.appendChild(createConfigItem(item, false));
      if (item.children) {
        for (const child of item.children) {
          const childEl = createConfigItem(child, true);
          childEl.dataset.parent = item.key;
          const parentVal = configData[item.key];
          if (parentVal !== "true") {
            childEl.style.display = "none";
          }
          sec.appendChild(childEl);
        }
      }
    }

    container.appendChild(sec);
  }
}

function createConfigItem(item, isSub) {
  const div = document.createElement("div");
  div.className = isSub ? "sub-item" : "config-item";
  div.dataset.key = item.key;

  const info = document.createElement("div");
  info.className = "info";

  const name = document.createElement("div");
  name.className = "name";
  name.textContent = t("cfg." + item.key) || item.key;
  if (item.warn) {
    const badge = document.createElement("span");
    badge.className = "warning-badge";
    badge.textContent = t("cfg." + item.key + ".warn") || "!";
    name.appendChild(badge);
  }
  info.appendChild(name);

  const descKey = "cfg." + item.key + ".desc";
  const descText = t(descKey);
  if (descText !== descKey) {
    const desc = document.createElement("div");
    desc.className = "desc";
    desc.textContent = descText;
    info.appendChild(desc);
  }

  const tipText = t("cfg." + item.key + ".tip");
  if (tipText !== "cfg." + item.key + ".tip") {
    const tip = document.createElement("div");
    tip.className = "number-tip";
    tip.textContent = tipText;
    info.appendChild(tip);
  }

  div.appendChild(info);

  if (item.type === "toggle") {
    const toggle = document.createElement("label");
    toggle.className = "toggle";
    const input = document.createElement("input");
    input.type = "checkbox";
    input.id = "cfg_" + item.key;
    const val = configData[item.key];
    input.checked = val === "true";
    input.addEventListener("change", function() {
      configData[item.key] = this.checked ? "true" : "false";
      // Toggle children visibility
      document.querySelectorAll('[data-parent="' + item.key + '"]').forEach(el => {
        el.style.display = this.checked ? "flex" : "none";
      });
    });
    const slider = document.createElement("span");
    slider.className = "slider";
    toggle.appendChild(input);
    toggle.appendChild(slider);
    div.appendChild(toggle);
  } else if (item.type === "number") {
    const input = document.createElement("input");
    input.type = "text";
    input.inputMode = "numeric";
    input.className = "number-input";
    input.id = "cfg_" + item.key;
    input.value = configData[item.key] || "";
    input.placeholder = "0";
    input.addEventListener("input", function() {
      configData[item.key] = this.value;
    });
    div.appendChild(input);
  } else if (item.type === "textarea") {
    const listDescText = t("cfg." + item.key + ".list.desc");
    if (listDescText !== "cfg." + item.key + ".list.desc" && listDescText) {
      const listDesc = document.createElement("div");
      listDesc.className = "desc";
      listDesc.style.padding = "12px 16px 0";
      listDesc.textContent = listDescText;
      div.appendChild(listDesc);
    }

const textarea = document.createElement("textarea");
textarea.className = "app-list-textarea";
textarea.id = "cfg_" + item.key;
textarea.value = item.key === "黑名单" ? blacklistData : appListData;
textarea.placeholder = item.key === "黑名单" ? "com.example.app 50000000" : "com.example.app";
textarea.addEventListener("input", function() {
  if (item.key === "黑名单") {
    blacklistData = this.value;
  } else {
    appListData = this.value;
  }
});
div.appendChild(textarea);
  }

  return div;
}

// ==================== Status ====================
async function updateStatus() {
  try {
    const r = await execCmd(
      'echo "$(cat /sys/class/power_supply/battery/temp 2>/dev/null)||' +
      '$(cat /sys/class/power_supply/battery/current_now 2>/dev/null)||' +
      '$(cat /sys/class/power_supply/battery/capacity 2>/dev/null)||' +
      '$(cat /sys/class/power_supply/battery/status 2>/dev/null)"'
    );
    if (r.errno === 0 && r.stdout) {
      const parts = r.stdout.trim().split("||");
      if (parts.length >= 4) {
        const temp = parseInt(parts[0]) / 10;
        const current = Math.abs(parseInt(parts[1]) / 1000);
        const capacity = parts[2];
        const status = parts[3].trim();
        document.getElementById("st-temp").textContent = temp.toFixed(1) + "°C";
        document.getElementById("st-current").textContent = current + "mA";
        document.getElementById("st-battery").textContent = capacity + "%";
        const stateMap = { "Charging": "state.charging", "Discharging": "state.discharging", "Full": "state.full", "Not charging": "state.not_charging" };
        document.getElementById("st-status").textContent = t(stateMap[status] || "state.discharging");
      }
    }
  } catch(e) {}
}

// ==================== Load / Save ====================
async function detectModDir() {
  const r = await execCmd('ls -d /data/adb/modules/SetoSkins 2>/dev/null && echo "OK"');
  if (r.errno === 0 && r.stdout.includes("OK")) {
    modDir = "/data/adb/modules/SetoSkins";
    return true;
  }
  return false;
}

async function loadConfig() {
  showLoading(true);
  try {
    if (!modDir) await detectModDir();
    const r = await execCmd('cat "' + modDir + '/配置.prop" 2>/dev/null');
    if (r.errno === 0 && r.stdout) {
      configData = parseConfig(r.stdout);
      const r2 = await execCmd('cat "' + modDir + '/无温控应用.prop" 2>/dev/null');
      appListData = (r2.errno === 0 && r2.stdout) ? r2.stdout : "";
      const r3 = await execCmd('cat "' + modDir + '/黑名单.prop" 2>/dev/null');
      blacklistData = (r3.errno === 0 && r3.stdout) ? r3.stdout : "";
      renderConfig();
      updateStatus();
    } else {
      showToast(t("msg.no_config"), true);
    }
  } catch(e) {
    showToast(t("msg.save_fail"), true);
  }
  showLoading(false);
}

async function saveAndApply() {
  showLoading(true);
  try {
    const content = serializeConfig(configData);
    // Escape for shell: use base64 to avoid escaping issues
    const b64 = btoa(unescape(encodeURIComponent(content)));

    // Write to module dir AND persistent dir (survives updates)
    const writeCmd = 'echo "' + b64 + '" | base64 -d > "' + modDir + '/配置.prop" && ' +
      'mkdir -p /data/adb/SetoSkins && ' +
      'echo "' + b64 + '" | base64 -d > /data/adb/SetoSkins/配置.prop';
    const r = await execCmd(writeCmd);
    if (r.errno !== 0) {
      showToast(t("msg.save_fail"), true);
      showLoading(false);
      return;
    }

    // Save app list for SetoSpecificApp
    const b64Apps = btoa(unescape(encodeURIComponent(appListData)));
    await execCmd('echo "' + b64Apps + '" | base64 -d > "' + modDir + '/无温控应用.prop" && ' +
      'echo "' + b64Apps + '" | base64 -d > /data/adb/SetoSkins/无温控应用.prop');

    // Save blacklist for per-app speed control
    const b64Blacklist = btoa(unescape(encodeURIComponent(blacklistData)));
    await execCmd('echo "' + b64Blacklist + '" | base64 -d > "' + modDir + '/黑名单.prop" && ' +
      'echo "' + b64Blacklist + '" | base64 -d > /data/adb/SetoSkins/黑名单.prop');

    // Hot-reload: kill and restart all module scripts
    await execCmd(
      'pkill -f Seto_fuckthermal 2>/dev/null; ' +
      'pkill -f Seto_description 2>/dev/null; ' +
      'pkill -9 -f SetoSpecificApp 2>/dev/null; ' +
      'pkill -f SetoSpecificCurrent 2>/dev/null; ' +
      'sleep 0.5; ' +
      'nohup /system/bin/sh "' + modDir + '/system/Seto_fuckthermal.sh" >/dev/null 2>&1 &; ' +
      'nohup /system/bin/sh "' + modDir + '/system/Seto_description.sh" >/dev/null 2>&1 &; ' +
      'nohup "' + modDir + '/system/SetoSpecificApp" >/dev/null 2>&1 &; ' +
      'nohup "' + modDir + '/system/SetoSpecificCurrent" >/dev/null 2>&1 &'
    );

    // Restart thermal daemons
    await execCmd(
      'pkill -9 -f mi_thermald 2>/dev/null; ' +
      'sleep 0.5; ' +
      'for i in $(which -a mi_thermald 2>/dev/null); do nohup "$i" >/dev/null 2>&1 & done; ' +
      'setprop ctl.restart mi_thermald 2>/dev/null; ' +
      'setprop ctl.restart thermal 2>/dev/null'
    );

    showToast(t("msg.saved"), false);
    updateStatus();
  } catch(e) {
    showToast(t("msg.save_fail"), true);
  }
  showLoading(false);
}

// ==================== UI Helpers ====================
function showLoading(show) {
  document.getElementById("loading").classList.toggle("hidden", !show);
}

function showToast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (isError ? " error" : "");
  setTimeout(() => { el.className = "toast"; }, 2500);
}

// ==================== Init ====================
async function init() {
  currentLang = detectLang();
  initLangSelect();
  switchLang(currentLang);

  // Try fullscreen for KSU WebView
  if (typeof ksu !== "undefined") {
    try { ksu.fullScreen(true); } catch(e) {}
  }

  await loadConfig();

  // Auto-refresh status every 5 seconds
  setInterval(updateStatus, 5000);
}

init();
